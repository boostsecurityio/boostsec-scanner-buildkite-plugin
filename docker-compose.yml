version: "3"

services:
  lint:
    image: buildkite/plugin-linter
    command: ['--id', 'boostsecurityio/boostsec-scanner']
    volumes:
      - ".:/plugin:ro"

  shell:
    image: buildkite/agent
    entrypoint:
      - bash
    working_dir: /plugin
    volumes:
      - ".:/plugin:rw"

  tests:
    image: buildkite/plugin-tester:v2.0.0
    volumes:
      - ".:/plugin:ro"
